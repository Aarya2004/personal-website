<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Neural net "A" monogram:
       - Two outer nodes at bottom form the legs of the A.
       - One top node forms the apex.
       - A crossbar node connects the mid-legs.
       - Edges form the A's strokes plus hidden connections. -->
  <style>
    .edge { stroke: #B8342A; stroke-width: 3; fill: none; stroke-linecap: round; }
    .edge-thin { stroke: #B8342A; stroke-width: 2; fill: none; stroke-linecap: round; opacity: 0.55; }
    .node { fill: #B8342A; }
    .node-core { fill: #FDF7F0; }
  </style>
  <!-- Edges (A-shape strokes) -->
  <line class="edge" x1="32" y1="10" x2="12" y2="54" />
  <line class="edge" x1="32" y1="10" x2="52" y2="54" />
  <!-- Crossbar -->
  <line class="edge" x1="20" y1="36" x2="44" y2="36" />
  <!-- Hidden neural-net edges (subtler) -->
  <line class="edge-thin" x1="12" y1="54" x2="44" y2="36" />
  <line class="edge-thin" x1="52" y1="54" x2="20" y2="36" />
  <!-- Nodes: apex, left/right crossbar, left/right base -->
  <circle class="node" cx="32" cy="10" r="5.5" />
  <circle class="node-core" cx="32" cy="10" r="2" />
  <circle class="node" cx="20" cy="36" r="4.5" />
  <circle class="node-core" cx="20" cy="36" r="1.8" />
  <circle class="node" cx="44" cy="36" r="4.5" />
  <circle class="node-core" cx="44" cy="36" r="1.8" />
  <circle class="node" cx="12" cy="54" r="5" />
  <circle class="node-core" cx="12" cy="54" r="1.8" />
  <circle class="node" cx="52" cy="54" r="5" />
  <circle class="node-core" cx="52" cy="54" r="1.8" />
</svg>
